version: "3.8"

# BinaryLane Grafana Stack
# -----------------------
# Usage:
#   export BL_API_TOKEN="your-token-here"
#   docker compose up -d
#
# Then open http://localhost:3000  (admin / admin on first login)
# All dashboards and the datasource are provisioned automatically.

services:
  grafana:
    image: grafana/grafana:latest
    container_name: binarylane-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Change these before exposing to the network
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

      # Infinity plugin - install at startup
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource

      # Pass your BinaryLane API token in - referenced by the datasource provisioning
      BL_API_TOKEN: ${BL_API_TOKEN:?BL_API_TOKEN environment variable is required}

      # Allow Infinity to reach the BinaryLane API (required in newer Grafana)
      GF_SECURITY_CONTENT_SECURITY_POLICY: "false"

      # Useful for homelab - disable login if behind auth proxy
      # GF_AUTH_ANONYMOUS_ENABLED: "true"
      # GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer

    volumes:
      - grafana-data:/var/lib/grafana
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  grafana-data:
    name: binarylane-grafana-data
